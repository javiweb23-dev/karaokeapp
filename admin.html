<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Karaoke Latino</title>
    <link rel="stylesheet" href="style.css">
    <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
    .header { 
        background-color: #ff6600; 
        text-align: center; 
        padding: 15px; 
        position: fixed; 
        top: 0; 
        width: 100%; 
        z-index: 1000; 
    }
    .admin-container { 
        padding: 20px; 
        margin-top: 100px; 
    }
    .pedido-card {
        background: #1a1a1a;
        border-left: 5px solid #ff6600;
        padding: 20px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 0 10px 10px 0;
    }
    .info { flex-grow: 1; }
    .info small { color: #888; }
    .info strong { color: #ff6600; font-size: 1.2em; }
    .info span { display: block; margin-top: 5px; font-size: 1.1em; }
    .btn-avisar {
        background: #17a2b8;
        color: white;
        border: none;
        padding: 15px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-right: 10px;
    }
    .btn-avisar:disabled {
        background: #444;
        color: #888;
        cursor: not-allowed;
    }
    .btn-aprobar {
        background: #28a745;
        color: white;
        border: none;
        padding: 15px 25px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn-eliminar {
        background: #dc3545;
        color: white;
        border: none;
        padding: 15px;
        margin-left: 10px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    </style>
</head>
<body>
    <div class="header">
        <h1>PANEL DE CONTROL</h1>
    </div>

    <div class="admin-container">
        <div id="listaPedidos"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://mefrjbmjfdphdqndpzcw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function cargarPedidos() {
            const { data, error } = await _supabase
                .from('Solicitudes')
                .select('*')
                .in('estado', ['pendiente', 'preparate'])
                .order('created_at', { ascending: true });

            if (error) return;

            const contenedor = document.getElementById('listaPedidos');
            contenedor.innerHTML = '';

            data.forEach(pedido => {
                const div = document.createElement('div');
                div.className = 'pedido-card';
                
                const textoAvisar = pedido.estado === 'preparate' ? 'AVISADO ✓' : 'AVISAR';
                const estadoAvisar = pedido.estado === 'preparate' ? 'disabled' : '';

                div.innerHTML = `
                    <div class="info">
                        <small>${new Date(pedido.created_at).toLocaleTimeString()}</small><br>
                        <strong>${pedido.nombre_usuario}</strong> pide:<br>
                        <span>${pedido.cancion_info} (#${pedido.numero_cancion})</span>
                    </div>
                    <div>
                        <button class="btn-avisar" onclick="avisarPedido(${pedido.id})" ${estadoAvisar}>${textoAvisar}</button>
                        <button class="btn-aprobar" onclick="aprobarPedido(${pedido.id})">APROBAR</button>
                        <button class="btn-eliminar" onclick="eliminarPedido(${pedido.id})">X</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });
        }

        async function avisarPedido(id) {
            const { error } = await _supabase
                .from('Solicitudes')
                .update({ estado: 'preparate' })
                .eq('id', id);

            if (!error) cargarPedidos();
        }

        async function aprobarPedido(id) {
            const { error } = await _supabase
                .from('Solicitudes')
                .update({ estado: 'aprobada' })
                .eq('id', id);

            if (!error) cargarPedidos();
        }

        async function eliminarPedido(id) {
            if(!confirm('¿Eliminar pedido?')) return;
            const { error } = await _supabase
                .from('Solicitudes')
                .delete()
                .eq('id', id);

            if (!error) cargarPedidos();
        }

        _supabase
            .channel('cambios-admin')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'Solicitudes' }, () => {
                cargarPedidos();
            })
            .subscribe();

        cargarPedidos();
    </script>
</body>
</html>
