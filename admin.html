<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Karaoke Latino</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { padding: 20px; }
        .pedido-card {
            background: #222;
            border-left: 5px solid #ff6600;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-aprobar {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-eliminar {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PANEL DE CONTROL</h1>
    </div>

    <div class="admin-container">
        <div id="listaPedidos"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://mefrjbmjfdphdqndpzcw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function cargarPedidos() {
            const { data, error } = await _supabase
                .from('Solicitudes')
                .select('*')
                .eq('estado', 'pendiente')
                .order('created_at', { ascending: true });

            if (error) return;

            const contenedor = document.getElementById('listaPedidos');
            contenedor.innerHTML = '';

            data.forEach(pedido => {
                const div = document.createElement('div');
                div.className = 'pedido-card';
                div.innerHTML = `
                    <div>
                        <small>${new Date(pedido.created_at).toLocaleTimeString()}</small><br>
                        <strong>${pedido.nombre_usuario}</strong> pide:<br>
                        <span>${pedido.cancion_info} (#${pedido.numero_cancion})</span>
                    </div>
                    <div>
                        <button class="btn-aprobar" onclick="aprobarPedido(${pedido.id})">APROBAR</button>
                        <button class="btn-eliminar" onclick="eliminarPedido(${pedido.id})">X</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });
        }

        async function aprobarPedido(id) {
            const { error } = await _supabase
                .from('Solicitudes')
                .update({ estado: 'aprobada' })
                .eq('id', id);

            if (!error) cargarPedidos();
        }

        async function eliminarPedido(id) {
            if(!confirm('¿Eliminar pedido?')) return;
            const { error } = await _supabase
                .from('Solicitudes')
                .delete()
                .eq('id', id);

            if (!error) cargarPedidos();
        }

        _supabase
            .channel('cambios-admin')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'Solicitudes' }, () => {
                cargarPedidos();
            })
            .subscribe();

        cargarPedidos();
    </script>
</body>
</html>
