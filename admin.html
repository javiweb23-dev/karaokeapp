<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Karaoke Latino</title>
    <link rel="stylesheet" href="style.css">
    <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
    .header { 
        background-color: #ff6600; 
        text-align: center; 
        padding: 15px; 
        position: fixed; 
        top: 0; 
        width: 100%; 
        z-index: 1000; 
    }
    .lock-screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
    }
    .lock-box {
        width: calc(100% - 40px);
        max-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .lock-box input {
        padding: 14px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #111;
        color: #fff;
        font-size: 18px;
        text-align: center;
    }
    .lock-box button {
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: #ff6600;
        color: #fff;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
    }
    .admin-container { 
        padding: 20px; 
        margin-top: 100px; 
    }
    .pedido-card {
        background: #1a1a1a;
        border-left: 5px solid #ff6600;
        padding: 20px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        border-radius: 0 10px 10px 0;
        gap: 14px;
    }
    .info { flex-grow: 1; }
    .info small { color: #888; }
    .info strong { color: #ff6600; font-size: 1.2em; }
    .info span { display: block; margin-top: 5px; font-size: 1.1em; }
    .usuario-linea {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 2px;
    }
    .contador-pedidos {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        height: 28px;
        padding: 0 8px;
        border-radius: 999px;
        background: #ff6600;
        color: #fff;
        font-size: 12px;
        font-weight: bold;
        line-height: 1;
    }
    .acciones {
        width: 180px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
    }
    .btn-avisar {
        background: #ff6600;
        color: #fff;
        border: none;
        padding: 18px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        font-size: 16px;
    }
    .btn-avisar.enviado {
        background: #ffc107;
        color: #000;
    }
    .btn-eliminar {
        background: #dc3545;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
    }
    </style>
</head>
<body>
    <div class="lock-screen" id="lockScreen">
        <div class="lock-box">
            <input type="password" id="pinInput" placeholder="PIN de acceso" autocomplete="off">
            <button id="enterPinBtn">ENTRAR</button>
        </div>
    </div>
    <div class="header">
        <h1>PANEL DE CONTROL</h1>
    </div>

    <div class="admin-container">
        <div id="listaPedidos"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://mefrjbmjfdphdqndpzcw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const lockScreen = document.getElementById('lockScreen');
        const pinInput = document.getElementById('pinInput');
        const enterPinBtn = document.getElementById('enterPinBtn');

        function desbloquearAdmin() {
            lockScreen.style.display = 'none';
            pinInput.value = '';
            pinInput.blur();
        }

        function validarPin() {
            if (pinInput.value === '1234') {
                sessionStorage.setItem('admin_access_validado', 'true');
                desbloquearAdmin();
                return;
            }
            alert('Acceso denegado');
            pinInput.value = '';
            pinInput.focus();
        }

        if (sessionStorage.getItem('admin_access_validado') === 'true') {
            desbloquearAdmin();
        } else {
            pinInput.focus();
        }

        enterPinBtn.addEventListener('click', validarPin);
        pinInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') validarPin();
        });

        async function cargarPedidos() {
            const { data, error } = await _supabase
                .from('Solicitudes')
                .select('*')
                .in('estado', ['pendiente', 'preparate'])
                .order('created_at', { ascending: true });

            if (error) return;

            let todasLasFilas = [];
            let rangoInicio = 0;
            const tamRango = 1000;
            let errorTotales = null;
            while (true) {
                const res = await _supabase
                    .from('Solicitudes')
                    .select('id, nombre_usuario, created_at')
                    .order('id', { ascending: true })
                    .range(rangoInicio, rangoInicio + tamRango - 1);
                errorTotales = res.error;
                if (errorTotales) break;
                const trozo = res.data || [];
                todasLasFilas = todasLasFilas.concat(trozo);
                if (trozo.length < tamRango) break;
                rangoInicio += tamRango;
            }

            if (errorTotales) return;

            const porUsuario = {};
            todasLasFilas.forEach((fila) => {
                const clave = (fila.nombre_usuario || '').trim() || 'Sin nombre';
                if (!porUsuario[clave]) porUsuario[clave] = [];
                porUsuario[clave].push(fila);
            });
            Object.keys(porUsuario).forEach((clave) => {
                porUsuario[clave].sort((a, b) => {
                    const ta = new Date(a.created_at).getTime();
                    const tb = new Date(b.created_at).getTime();
                    if (ta !== tb) return ta - tb;
                    if (a.id < b.id) return -1;
                    if (a.id > b.id) return 1;
                    return 0;
                });
            });
            const ordenPorId = {};
            Object.keys(porUsuario).forEach((clave) => {
                porUsuario[clave].forEach((fila, indice) => {
                    ordenPorId[fila.id] = indice + 1;
                });
            });

            const contenedor = document.getElementById('listaPedidos');
            contenedor.innerHTML = '';

            (data || []).forEach((pedido) => {
                const nombreUsuario = (pedido.nombre_usuario || '').trim() || 'Sin nombre';
                const ordenPedido = ordenPorId[pedido.id] || 1;
                const div = document.createElement('div');
                div.className = 'pedido-card';
                const textoAvisar = pedido.estado === 'preparate' ? 'REENVIAR AVISO' : 'AVISAR';
                const claseAvisar = pedido.estado === 'preparate' ? 'btn-avisar enviado' : 'btn-avisar';

                div.innerHTML = `
                    <div class="info">
                        <small>${new Date(pedido.created_at).toLocaleTimeString()}</small><br>
                        <div class="usuario-linea">
                            <strong>${nombreUsuario}</strong>
                            <span class="contador-pedidos">#${ordenPedido}</span>
                        </div>
                        pide:<br>
                        <span>${pedido.cancion_info} (#${pedido.numero_cancion})</span>
                    </div>
                    <div class="acciones">
                        <button class="${claseAvisar}" onclick="avisarPedido(${pedido.id})">${textoAvisar}</button>
                        <button class="btn-eliminar" onclick="eliminarPedido(${pedido.id})">X</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });
        }

        async function avisarPedido(id) {
            const { error } = await _supabase
                .from('Solicitudes')
                .update({ estado: 'preparate' })
                .eq('id', id);

            if (!error) cargarPedidos();
        }

        async function eliminarPedido(id) {
            if(!confirm('¿Eliminar pedido de la lista?')) return;
            const { error } = await _supabase
                .from('Solicitudes')
                .update({ estado: 'completada' })
                .eq('id', id);

            if (!error) cargarPedidos();
        }

        _supabase
            .channel('cambios-admin')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'Solicitudes' }, () => {
                cargarPedidos();
            })
            .subscribe();

        cargarPedidos();
    </script>
</body>
</html>
