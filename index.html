<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Karaoke Latino</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="songs.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-logo img {
            max-width: 180px;
            height: auto;
        }

        #buscador {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .filtros-idioma {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .btn-filtro {
            background-color: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-filtro.active {
            background-color: #ff6600;
            color: white;
            border-color: #ff6600;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            background-color: #1e1e1e;
            border-radius: 10px;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; 
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
            white-space: nowrap;
        }

        th {
            background-color: #1a1a1a;
            color: #ff6600;
        }

        .btn-pedir {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .extra-options {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #333;
            border-radius: 10px;
        }

        .btn-especial {
            background-color: transparent;
            color: #ff6600;
            border: 1px solid #ff6600;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-logo">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="filtros-idioma">
            <button class="btn-filtro active" onclick="cambiarIdioma('Todos', this)">Todos</button>
            <button class="btn-filtro" onclick="cambiarIdioma('Español', this)">Español</button>
            <button class="btn-filtro" onclick="cambiarIdioma('Inglés', this)">Inglés</button>
        </div>

        <input type="text" id="buscador" placeholder="Buscar artista o canción..." onkeyup="ejecutarFiltro()">

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Pedir</th>
                        <th>Artista</th>
                        <th>Canción</th>
                        <th>Género</th>
                        <th>#</th>
                    </tr>
                </thead>
                <tbody id="lista-canciones"></tbody>
            </table>
        </div>

        <div class="extra-options">
            <div style="color: #aaa; margin-bottom: 10px;">¿No encuentras tu canción?</div>
            <button class="btn-especial" onclick="pedirFueraDeLista()">Pedir canción fuera de lista</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mefrjbmjfdphdqndpzcw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let filtroIdioma = 'Todos';

        function render(datos) {
            const listado = document.getElementById('lista-canciones');
            let html = '';
            
            datos.forEach(s => {
                const tituloEscapado = s.title.replace(/'/g, "\\'");
                const artistaEscapado = s.artist.replace(/'/g, "\\'");
                
                html += `
                    <tr>
                        <td>
                            <button class="btn-pedir" onclick="enviarPedido(${s.number}, '${tituloEscapado}', '${artistaEscapado}')">Pedir</button>
                        </td>
                        <td>${s.artist}</td>
                        <td>${s.title}</td>
                        <td style="color: #888;">${s.genre}</td>
                        <td style="color: #555;">${s.number}</td>
                    </tr>
                `;
            });
            listado.innerHTML = html;
        }

        function ejecutarFiltro() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const resultado = songsDatabase.filter(s => {
                const cumpleTexto = s.artist.toLowerCase().includes(busqueda) || s.title.toLowerCase().includes(busqueda);
                const cumpleIdioma = filtroIdioma === 'Todos' || s.language === filtroIdioma;
                return cumpleTexto && cumpleIdioma;
            });
            render(resultado);
        }

        function cambiarIdioma(idioma, el) {
            filtroIdioma = idioma;
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            ejecutarFiltro();
        }

        async function enviarPedido(num, titulo, artista) {
            const { error } = await _supabase
                .from('Solicitudes')
                .insert([{ 
                    numero_cancion: num, 
                    nombre_cancion: titulo, 
                    artista: artista, 
                    estado: 'pendiente' 
                }]);

            if (error) alert('Error al enviar');
            else alert('¡Pedido enviado con éxito!');
        }

        async function pedirFueraDeLista() {
            const res = prompt("Escribe: ARTISTA - CANCIÓN");
            if (res) {
                const { error } = await _supabase
                    .from('Solicitudes')
                    .insert([{ 
                        nombre_cancion: 'FUERA DE LISTA: ' + res, 
                        artista: 'CLIENTE', 
                        numero_cancion: 0,
                        estado: 'pendiente' 
                    }]);
                alert('Sugerencia enviada');
            }
        }

        render(songsDatabase);
    </script>
</body>
</html>
