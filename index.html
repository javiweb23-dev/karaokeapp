<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Karaoke Latino - Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="songs.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* LOGO */
        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-logo img {
            max-width: 180px; /* Ajusta según el tamaño de tu logo */
            height: auto;
        }

        /* BUSCADOR Y FILTROS */
        #buscador {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .filtros-idioma {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .btn-filtro {
            background-color: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-filtro.active {
            background-color: #ff6600;
            color: white;
            border-color: #ff6600;
        }

        /* TABLA CON SCROLL LATERAL */
        .table-wrapper {
            width: 100%;
            overflow-x: auto; /* Permite mover a un lado */
            -webkit-overflow-scrolling: touch;
            border-radius: 10px;
            background-color: #1e1e1e;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px; /* Fuerza el scroll en móviles */
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #333;
            white-space: nowrap; /* Evita que el texto salte de línea */
        }

        th {
            background-color: #1a1a1a;
            color: #ff6600;
            font-size: 13px;
            text-transform: uppercase;
        }

        /* BOTÓN PEDIR FIJO (Opcional: puedes hacerlo sticky si quieres que no se mueva) */
        .col-btn {
            width: 80px;
            position: sticky;
            left: 0;
            background-color: #1e1e1e;
            z-index: 2;
        }
        
        th.col-btn { background-color: #1a1a1a; z-index: 3; }

        .btn-pedir {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* BOTÓN CANCIÓN NO ENCONTRADA */
        .extra-options {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 10px;
            border: 1px dashed #444;
        }

        .btn-especial {
            background-color: transparent;
            color: #ff6600;
            border: 1px solid #ff6600;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-logo">
            <img src="logo.png" alt="Mi Karaoke Latino">
        </div>
        
        <div class="filtros-idioma">
            <button class="btn-filtro active" onclick="filtrarIdioma('Todos', this)">Todos</button>
            <button class="btn-filtro" onclick="filtrarIdioma('Español', this)">Español</button>
            <button class="btn-filtro" onclick="filtrarIdioma('Inglés', this)">Inglés</button>
        </div>

        <input type="text" id="buscador" placeholder="Busca tu artista o canción..." onkeyup="filtrar()">

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="col-btn">Pedir</th>
                        <th>Artista</th>
                        <th>Canción</th>
                        <th>Género</th>
                        <th>#</th>
                    </tr>
                </thead>
                <tbody id="lista-canciones"></tbody>
            </table>
        </div>

        <div class="extra-options">
            <p style="color: #888;">¿No encuentras lo que buscas?</p>
            <button class="btn-especial" onclick="pedirEspecial()">Sugerir canción que no está en la lista</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mefrjbmjfdphdqndpzcw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let idiomaActual = 'Todos';

        function renderizar(canciones) {
            const tbody = document.getElementById('lista-canciones');
            tbody.innerHTML = '';

            canciones.forEach(song => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="col-btn">
                        <button class="btn-pedir" onclick="solicitar(${song.number}, '${song.title.replace(/'/g, "\\'")}', '${song.artist.replace(/'/g, "\\'")}')">Pedir</button>
                    </td>
                    <td>${song.artist}</td>
                    <td>${song.title}</td>
                    <td style="color: #888;">${song.genre}</td>
                    <td style="color: #666;">${song.number}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filtrar() {
            const termino = document.getElementById('buscador').value.toLowerCase();
            const filtradas = songsDatabase.filter(s => {
                const matchTexto = s.artist.toLowerCase().includes(termino) || s.title.toLowerCase().includes(termino);
                const matchIdioma = (idiomaActual === 'Todos' || s.language === idiomaActual);
                return matchTexto && matchIdioma;
            });
            renderizar(filtradas);
        }

        function filtrarIdioma(idioma, element) {
            idiomaActual = idioma;
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            filtrar();
        }

        async function solicitar(numero, titulo, artista) {
            const { error } = await _supabase
                .from('Solicitudes')
                .insert([{ numero_cancion: numero, nombre_cancion: titulo, artista: artista, estado: 'pendiente' }]);

            if (error) alert('Error al enviar');
            else alert('¡Enviada! Espera tu turno.');
        }

        function pedirEspecial() {
            const sugerencia = prompt("Escribe el nombre de la canción y el artista que quieres:");
            if (sugerencia) {
                _supabase.from('Solicitudes').insert([{ nombre_cancion: 'SUGERENCIA: ' + sugerencia, artista: 'EXTERNO', estado: 'pendiente' }]);
                alert("Gracias, intentaremos buscarla por ti.");
            }
        }

        renderizar(songsDatabase);
    </script>
</body>
</html>
