<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Karaoke Latino</title>
    
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <button id="installBtn" class="install-btn" style="display:none;">📲 AÑADIR A INICIO</button>
    <p id="installNote" class="install-note" style="display:none;">Nota: Esta acción solo crea un acceso directo; la app no se instalará en su teléfono ni tendrá acceso por ningún motivo a su información</p>
    <div class="header">
        <img src="logo.png" alt="Logo" class="logo">
    </div>
    <div class="live-status" id="liveStatusBar">
        <strong>ESTADO EN VIVO</strong>
        <span id="liveSingerText">🎤 CANTANDO AHORA: ---</span>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="BUSCAR POR TÍTULO, ARTISTA O NÚMERO...">
        <select id="languageFilter">
            <option value="">TODOS LOS IDIOMAS</option>
            <option value="español">Español</option>
            <option value="inglés">Inglés</option>
        </select>
        <div class="share-qr-wrap">
            <button id="openQrBtn" class="share-qr-btn">Compartir QR</button>
        </div>
    </div>
    <div id="qrModal" class="qr-modal">
        <div class="qr-modal-content">
            <h3>Comparte esta mesa</h3>
            <img id="qrImage" alt="QR para compartir">
            <button id="closeQrBtn" class="close-qr-btn">Cerrar</button>
        </div>
    </div>

    <div id="loading">Cargando canciones...</div>
    <div id="noResults" style="display:none;">No se encontraron resultados</div>

    <div class="table-wrapper">
        <table id="songsTable">
            <thead>
                <tr>
                    <th>Acción</th>
                    <th>Artista</th>
                    <th>Título</th>
                    <th>Género</th>
                </tr>
            </thead>
            <tbody id="songsTableBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="songs.js?v=1.6"></script>
    <script src="app.js?v=1.6"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (let registration of registrations) {
                    registration.unregister().then(function(boolean) {
                        console.log('Service Worker viejo eliminado exitosamente.');
                    });
                }
            });
        }
    </script>
</body>
</html>
