<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Karaoke Latino</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
      <div class="logo-container"><img src="logo.png" alt="Logo" class="logo-image"></div>
      <div class="search-filter-container">
          <input type="text" id="searchInput" class="search-input" placeholder="Buscar canción...">
          <div class="filters-row">
              <select id="languageFilter" class="filter-select" style="width: 100%;">
                  <option value="español">ESPAÑOL</option>
                  <option value="ingles">INGLÉS</option>
              </select>
          </div>
      </div>
  </header>
  <div class="table-container">
      <table class="songs-table">
          <tbody id="songsTableBody"></tbody>
      </table>
  </div>
  <div id="loading">Cargando...</div>
  <div id="noResults" style="display: none; color: orange; text-align: center;">No hay resultados</div>
  <script src="songs.js?v=2.0"></script>
  <script src="app.js?v=2.0"></script>
</body>
</html>
