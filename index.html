<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Karaoke Latino</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="songs.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .header-logo img {
            max-width: 150px;
            height: auto;
        }

        .filtros-idioma {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .btn-filtro {
            background-color: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-filtro.active {
            background-color: #ff6600;
            color: white;
            border-color: #ff6600;
        }

        #buscador {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background-color: #1e1e1e;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #333;
            white-space: nowrap;
        }

        th {
            background-color: #1a1a1a;
            color: #ff6600;
            font-size: 12px;
            text-transform: uppercase;
        }

        .btn-pedir {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-pedir:active {
            transform: scale(0.95);
        }

        .extra-options {
            text-align: center;
            margin-top: 25px;
            padding: 15px;
            border: 1px dashed #444;
            border-radius: 8px;
        }

        .btn-especial {
            background-color: transparent;
            color: #ff6600;
            border: 1px solid #ff6600;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-logo">
            <img src="logo.png" alt="Logo">
        </div>
        
        <div class="filtros-idioma">
            <button class="btn-filtro active" onclick="filtrarIdioma('Todos', this)">Todos</button>
            <button class="btn-filtro" onclick="filtrarIdioma('Español', this)">Español</button>
            <button class="btn-filtro" onclick="filtrarIdioma('Inglés', this)">Inglés</button>
        </div>

        <input type="text" id="buscador" placeholder="Buscar artista o canción..." onkeyup="filtrar()">

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Pedir</th>
                        <th>Artista</th>
                        <th>Canción</th>
                        <th>Género</th>
                        <th>#</th>
                    </tr>
                </thead>
                <tbody id="lista-canciones"></tbody>
            </table>
        </div>

        <div class="extra-options">
            <div style="color: #888; font-size: 14px;">¿No está tu canción?</div>
            <button class="btn-especial" onclick="pedirEspecial()">Pedir canción fuera de lista</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mefrjbmjfdphdqndpzcw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let idiomaActual = 'Todos';

        function renderizar(canciones) {
            const tbody = document.getElementById('lista-canciones');
            tbody.innerHTML = '';

            canciones.forEach(song => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <button class="btn-pedir" onclick="solicitar(${song.number}, \`${song.title.replace(/`/g, '\\`').replace(/'/g, "\\'")}\`, \`${song.artist.replace(/`/g, '\\`').replace(/'/g, "\\'")}\`)">Pedir</button>
                    </td>
                    <td>${song.artist}</td>
                    <td>${song.title}</td>
                    <td style="color: #888;">${song.genre}</td>
                    <td style="color: #666;">${song.number}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filtrar() {
            const termino = document.getElementById('buscador').value.toLowerCase();
            const filtradas = songsDatabase.filter(s => {
                const matchTexto = s.artist.toLowerCase().includes(termino) || s.title.toLowerCase().includes(termino);
                const matchIdioma = (idiomaActual === 'Todos' || s.language === idiomaActual);
                return matchTexto && matchIdioma;
            });
            renderizar(filtradas);
        }

        function filtrarIdioma(idioma, element) {
            idiomaActual = idioma;
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            filtrar();
        }

        async function solicitar(numero, titulo, artista) {
            const { error } = await _supabase
                .from('Solicitudes')
                .insert([{ 
                    numero_cancion: numero, 
                    nombre_cancion: titulo, 
                    artista: artista, 
                    estado: 'pendiente' 
                }]);

            if (error) {
                alert('Error al enviar');
            } else {
                alert('¡Canción enviada!');
            }
        }

        async function pedirEspecial() {
            const cancion = prompt("Nombre de la canción:");
            if (!cancion) return;
            const artista = prompt("Nombre del artista:");
            if (!artista) return;

            const { error } = await _supabase
                .from('Solicitudes')
                .insert([{ 
                    nombre_cancion: 'ESPECIAL: ' + cancion, 
                    artista: artista, 
                    numero_cancion: 0,
                    estado: 'pendiente' 
                }]);

            if (error) alert('Error al enviar sugerencia');
            else alert('Sugerencia enviada correctamente');
        }

        renderizar(songsDatabase);
    </script>
</body>
</html>
