<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Karaoke Latino</title>
    
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Logo" class="logo">
        <button type="button" id="openQrBtn" class="header-qr-btn" aria-label="Compartir código QR">
            <svg class="header-qr-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect width="5" height="5" x="7" y="7" rx="1"/><rect width="5" height="5" x="14" y="7" rx="1"/><rect width="5" height="5" x="7" y="14" rx="1"/></svg>
        </button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="BUSCAR POR TÍTULO, ARTISTA O NÚMERO...">
        <button type="button" id="langToggle" data-lang="español">ESPAÑOL</button>
    </div>
    <div id="qrModal" class="qr-modal">
        <div class="qr-modal-content">
            <h3>Comparte esta mesa</h3>
            <img id="qrImage" alt="QR para compartir">
            <button id="closeQrBtn" class="close-qr-btn">Cerrar</button>
        </div>
    </div>

    <div id="loading">Cargando canciones...</div>
    <div id="noResults" style="display:none;">No se encontraron resultados</div>

    <div class="table-wrapper">
        <table id="songsTable">
            <thead>
                <tr>
                    <th>Acción</th>
                    <th>Artista</th>
                    <th>Título</th>
                    <th>Género</th>
                </tr>
            </thead>
            <tbody id="songsTableBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="songs.js?v=1.6"></script>
    <script src="app.js?v=1.6"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (let registration of registrations) {
                    registration.unregister().then(function(boolean) {
                        console.log('Service Worker viejo eliminado exitosamente.');
                    });
                }
            });
        }
    </script>
</body>
</html>
