<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Karaoke Latino</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="songs.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-logo img {
            max-width: 180px;
            height: auto;
        }

        .filtros-idioma {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .btn-filtro {
            background-color: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-filtro.active {
            background-color: #ff6600;
            color: white;
            border-color: #ff6600;
        }

        #buscador {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            background-color: #1e1e1e;
            border-radius: 10px;
            border: 1px solid #333;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
            white-space: nowrap;
        }

        th {
            background-color: #1a1a1a;
            color: #ff6600;
            font-size: 12px;
            text-transform: uppercase;
        }

        .btn-pedir {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .extra-options {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #333;
            border-radius: 10px;
        }

        .btn-especial {
            background-color: transparent;
            color: #ff6600;
            border: 1px solid #ff6600;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-logo">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="filtros-idioma">
            <button class="btn-filtro active" onclick="cambiarIdioma('Todos', this)">Todos</button>
            <button class="btn-filtro" onclick="cambiarIdioma('Español', this)">Español</button>
            <button class="btn-filtro" onclick="cambiarIdioma('Inglés', this)">Inglés</button>
        </div>

        <input type="text" id="buscador" placeholder="Busca tu artista o canción..." onkeyup="ejecutarFiltro()">

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">Pedir</th>
                        <th>Artista</th>
                        <th>Canción</th>
                        <th>Género</th>
                        <th>#</th>
                    </tr>
                </thead>
                <tbody id="lista-canciones"></tbody>
            </table>
        </div>

        <div class="extra-options">
            <div style="color: #aaa; margin-bottom: 10px;">¿No encuentras tu canción?</div>
            <button class="btn-especial" onclick="pedirManual()">Pedir canción fuera de lista</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mefrjbmjfdphdqndpzcw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let idiomaFiltro = 'Todos';

        function render(canciones) {
            const listado = document.getElementById('lista-canciones');
            listado.innerHTML = '';

            canciones.forEach(s => {
                const tr = document.createElement('tr');
                
                const tdBtn = document.createElement('td');
                const btn = document.createElement('button');
                btn.className = 'btn-pedir';
                btn.innerText = 'Pedir';
                btn.onclick = () => enviarPedido(s.number, s.title, s.artist);
                tdBtn.appendChild(btn);

                const tdArtista = document.createElement('td');
                tdArtista.textContent = s.artist;

                const tdTitulo = document.createElement('td');
                tdTitulo.textContent = s.title;

                const tdGenero = document.createElement('td');
                tdGenero.style.color = '#888';
                tdGenero.textContent = s.genre;

                const tdNum = document.createElement('td');
                tdNum.style.color = '#555';
                tdNum.textContent = '#' + s.number;

                tr.appendChild(tdBtn);
                tr.appendChild(tdArtista);
                tr.appendChild(tdTitulo);
                tr.appendChild(tdGenero);
                tr.appendChild(tdNum);

                listado.appendChild(tr);
            });
        }

        function ejecutarFiltro() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const filtradas = songsDatabase.filter(s => {
                const matchTexto = s.artist.toLowerCase().includes(texto) || s.title.toLowerCase().includes(texto);
                const matchIdioma = (idiomaFiltro === 'Todos' || s.language === idiomaFiltro);
                return matchTexto && matchIdioma;
            });
            render(filtradas);
        }

        function cambiarIdioma(idioma, el) {
            idiomaFiltro = idioma;
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            ejecutarFiltro();
        }

        async function enviarPedido(num, titulo, artista) {
            const { error } = await _supabase
                .from('Solicitudes')
                .insert([{ 
                    numero_cancion: num, 
                    nombre_cancion: titulo, 
                    artista: artista, 
                    estado: 'pendiente' 
                }]);

            if (error) {
                alert('Error al enviar');
            } else {
                alert('¡Canción pedida con éxito!');
            }
        }

        async function pedirManual() {
            const art = prompt("Artista:");
            if (!art) return;
            const can = prompt("Canción:");
            if (!can) return;

            const { error } = await _supabase.from('Solicitudes').insert([{ 
                nombre_cancion: 'MANUAL: ' + can, 
                artista: art, 
                numero_cancion: 0,
                estado: 'pendiente' 
            }]);

            if (error) alert('Error al enviar sugerencia');
            else alert('Sugerencia enviada correctamente');
        }

        render(songsDatabase);
    </script>
</body>
</html>
