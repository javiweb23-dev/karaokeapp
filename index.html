<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Latino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="BUSCAR POR TÍTULO, ARTISTA O NÚMERO...">
        <select id="languageFilter">
            <option value="">TODOS LOS IDIOMAS</option>
            <option value="español">Español</option>
            <option value="inglés">Inglés</option>
        </select>
        <div class="custom-request">
    <button onclick="window.open('https://wa.me/584121591072?text=Hola,%20quiero%20pedir%20un%20tema%20fuera%20de%20la%20lista:%20', '_blank')">¿No encuentras tu tema? Pídelo aquí 📲</button>
</div>
    </div>

    <div id="loading">Cargando canciones...</div>
    <div id="noResults" style="display:none;">No se encontraron resultados</div>

    <div class="table-wrapper">
        <table id="songsTable">
            <thead>
                <tr>
                    <th>Acción</th>
                    <th>Artista</th>
                    <th>Título</th>
                    <th>Género</th>
                </tr>
            </thead>
            <tbody id="songsTableBody"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="songs.js"></script>
    <script src="app.js"></script>
</body>
</html>
